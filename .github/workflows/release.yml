name: release

on:
  release:
    types: 
      - published

env:
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  build:
    uses: ./.github/workflows/build.yml

  upload-release-assets:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: KerbinHeavyIndustries
          path: KerbinHeavyIndustries
      - uses: actions/download-artifact@v4
        with:
          name: KerbinHeavyIndustries.version

      - name: Create Zip
        run: |
          cd KerbinHeavyIndustries
          zip -r9 ../KerbinHeavyIndustries.zip *

      - name: Upload Release Assets
        run: |
          gh release upload --clobber ${{ github.ref_name }}  \
            KerbinHeavyIndustries.zip                  \
            KerbinHeavyIndustries.version