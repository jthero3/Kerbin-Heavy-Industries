		#KDVA-LaunchPad-titl = KD Launch Pad
		#KDVA-LaunchPad-desc = Provides Kerbals the ability to assemble ships in orbit or elsewhere.

		#KDVA-LaunchPad-variants-125 = 1.25m Launch Pad
		#KDVA-LaunchPad-variants-250 = 2.5m Launch Pad

		#KDVA-LaunchPad-side-titl = KD Launch Pad (Side)
		#KDVA-LaunchPad-side-desc = Provides Kerbals the ability to assemble ships in orbit or elsewhere.

		#KDVA-LaunchPad-side-variants-125 = Side mounted 1.25m LaunchPad
		#KDVA-LaunchPad-side-variants-250 = Side mounted 2.5m LaunchPad

		#KDVA-LaunchPad-top-titl = KD Launch Pad (Top)
		#KDVA-LaunchPad-top-desc = Provides Kerbals the ability to assemble ships in orbit or elsewhere.

		#KDVA-LaunchPad-top-variants-125 = Top mounted 1.25m LaunchPad
		#KDVA-LaunchPad-top-variants-250 = Top mounted 2.5m LaunchPad

		#KDVA-LaunchSite-titl = KD Launch Site
		#KDVA-LaunchSite-desc = Just a simple LaunchSite. Vessels can only be launched from here. It must be assembled in a Mobile VAB or alike.
		
		#KDVA-fabrication-container-titl = KD Fabrication Container
		#KDVA-fabrication-container-desc = Provides Kerbals the ability to fabricate RocketParts. An engineer is required to operate! Also provides a good productivity factor.

		#KDVA-vab-mobile-titl = KD Mobile VAB
		#KDVA-vab-mobile-desc = Provides Kerbals the ability to assemble vessels anywhere. A LaunchSite is required in order to launch assembled vessels. The very high productivity factor can be used to improve production time on Launchpads.
		
