// Parts
	// 3D-Printer
		#KDVA-3DPrinter-titl = KD 3D Printer 2.5m
		#KDVA-3DPrinter-desc = This high-tec machinery prints RocketParts from Metal almost loss-less. Furthermore no Kerbals are required to operate it! Not saying an engineer would be useless...

	// Chemical Reactor
		#KDVA-chemreactor-titl = KD ChemicalReactor 2.5m
		#KDVA-chemreactor-desc = This high-end chemical reactor extracts almost all compounds from Ore. To achive high yields the reactor needs to work slowly. The chemical extraction is the slow and efficient way to refine Ore.

	// Extension Pad
		#KDVA-pad-extension-titl = KD Pad (Extension)
		#KDVA-pad-extension-desc = ExtensionPad can be used to extend an existing vessel.

		#KDVA-pad-extension-variants-0625 = 0.625m Extension Pad
		#KDVA-pad-extension-variants-1250 = 1.25m Extension Pad
		#KDVA-pad-extension-variants-1875 = 1.875m Extension Pad
