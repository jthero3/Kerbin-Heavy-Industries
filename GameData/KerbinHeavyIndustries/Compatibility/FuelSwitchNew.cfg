// Resource Volume as of 2017.01.01
// 5: Ore, MetalOre, Metal, RocketParts, ScrapMetal
// 1: MaterialKits, RareMetals, ExoticMinerals, Dirt
// SC uses volume = 1 for Metal
//
//	#######################
//	All Regular Tanks
//	#######################
//
//	B9 Tank Types
B9_TANK_TYPE:NEEDS[B9PartSwitch]
{
	name = KDRocketParts
	tankMass = 0.0
	tankCost = 0.0
	RESOURCE
	{
		name = RocketParts
		unitsPerVolume = 1
	}
}

B9_TANK_TYPE:NEEDS[B9PartSwitch]
{
	name = KDMetal
	tankMass = 0.0
	tankCost = 0.0
	RESOURCE
	{
		name = Metal
		unitsPerVolume:NEEDS[!SimpleConstruction] = 1
		unitsPerVolume:NEEDS[SimpleConstruction] = 5
	}
}

B9_TANK_TYPE:NEEDS[B9PartSwitch]
{
	name = KDOre
	tankMass = 0.0
	tankCost = 0.0
	RESOURCE
	{
		name = Ore
		unitsPerVolume = 1
	}
}
B9_TANK_TYPE:NEEDS[B9PartSwitch]
{
	name = KDLFO
	tankMass = 0.0
	tankCost = 0.0
	RESOURCE
	{
		name = LiquidFuel
		unitsPerVolume = 0.45
	}
	RESOURCE
	{
		name = Oxidizer
		unitsPerVolume = 0.55
	}
}

//	#######################
//	Variables
//	#######################
@PART[KD-T????FS|KD-ST????FS]:HAS[@RESOURCE[KDVolume]]:NEEDS[B9PartSwitch]:BEFORE[KerbinHeavyIndustries]
{
	%KDV1 = #$RESOURCE[KDVolume]/maxAmount$		// KDV1 equals tank volume
	%KDV5 = #$KDV1$					// KDV5 equals tank volume
	@KDV5 *= 0.2					// KDV5 is divided by 5 for resources with 5 FU per Liter
	%KDV1H = #$KDV1$
	@KDV1H *= 0.5					// KDV1 is diveded by 2 for two resources in one tank-setup at the same time
	%KDVLF = #$KDV5$
	@KDVLF *= 0.45
	%KDVOX = #$KDV5$
	@KDVOX *= 0.55
	@mass = #$KDV5$
	@mass *= 0.000625				// =*0.01*0.125*0.5; Density(Ore)*1/8*0.5
}

//	#######################
//	B9 Partswitcher config
//	#######################
@PART[KD-T????FS|KD-ST????FS]:HAS[@RESOURCE[KDVolume]]:NEEDS[B9PartSwitch]:FOR[KerbinHeavyIndustries]
{

	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = fuelSwitch
		switcherDescription = Tank Type
		baseVolume = #$../KDV5$

		SUBTYPE
		{
			name = RocketParts
			tankType = KDRocketParts
			transform = FS01
		}
		SUBTYPE
		{
			name = Metal
			tankType = KDMetal
			addedMass = #$../../mass$
			transform = FS02
		}
		SUBTYPE
		{
			name = Ore
			tankType = KDOre
			addedMass = #$../../mass$
			transform = FS03
		}
		SUBTYPE
		{
			name = LFO
			tankType = KDLFO
			transform = FS07
		}
	}
}

//	#######################
//	ST Series TopBot Switcher
//	#######################
@PART[KD-ST????FS]:NEEDS[B9PartSwitch]:FOR[KerbinHeavyIndustries]
{
	MODULE:NEEDS[B9PartSwitch]
	{
		name = ModuleB9PartSwitch
		moduleID = TopBotSwitch
		switcherDescription = Top Bot Type
		SUBTYPE
		{
			name = Crewed
			transform = Model_Foil
		}
		SUBTYPE
		{
			name = Cargo
			transform = Model_TopBot
		}
	}
}

//	#######################
//	Cleaning Up
//	#######################
@PART[KD-T????FS|KD-ST????FS]:HAS[@RESOURCE[KDVolume]]:AFTER[KerbinHeavyIndustries]
{
	!RESOURCE[KDVolume] {}
	!KDV1 = 0
	!KDV5 = 0
	!KDV1H = 0
	!KDVLF = 0
	!KDVOX = 0
}