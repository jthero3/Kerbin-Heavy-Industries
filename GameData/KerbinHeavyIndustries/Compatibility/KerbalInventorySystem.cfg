@PART[KD-LaunchSite]:NEEDS[!KIS]:FOR[KerbinHeavyIndustries]
{
	@TechRequired = Unresearchable
	@category = none
}

@PART[KD-LaunchSite]:NEEDS[KIS]:FOR[KerbinHeavyIndustries]
{
	MODULE,3
	{
		name = ModuleKISItem
		allowStaticAttach = 2
		allowPartAttach = 0
		stackable = True
		editorItemsCategory = True
		equipable = True
		equipMode = part
		equipSlot = leftHand
		equipBoneName = aliasLeftPalm
		equipPos = (-0.07,-0.03,0.125)
		equipDir = (85,0,0)
	}
}
